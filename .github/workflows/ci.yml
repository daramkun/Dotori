name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Build NativeAOT artifacts
        shell: bash
        run: ./build.sh --only cli,build_server,worker --rid ${{ matrix.rid }}
        env:
          SDKROOT: ${{ matrix.os == 'macos-latest' && '/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk' || '' }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist/cli dist/server dist/worker
          for f in build/cli/dotori build/cli/dotori.exe; do
            if [ -f "$f" ]; then cp "$f" dist/cli/; fi
          done
          for f in build/build_server/dotori-server build/build_server/dotori-server.exe; do
            if [ -f "$f" ]; then cp "$f" dist/server/; fi
          done
          for f in build/worker/dotori-worker build/worker/dotori-worker.exe; do
            if [ -f "$f" ]; then cp "$f" dist/worker/; fi
          done

      - name: Upload dotori artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-${{ matrix.rid }}
          path: dist/cli/
          retention-days: 7

      - name: Upload dotori-server artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-server-${{ matrix.rid }}
          path: dist/server/
          retention-days: 7

      - name: Upload dotori-worker artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-worker-${{ matrix.rid }}
          path: dist/worker/
          retention-days: 7
