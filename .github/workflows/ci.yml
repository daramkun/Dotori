name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Build NativeAOT artifacts
        shell: bash
        run: ./build.sh --only cli,build_server,worker --rid ${{ matrix.rid }}
        env:
          SDKROOT: ${{ matrix.os == 'macos-latest' && '/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk' || '' }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for src in build/cli build/build_server build/worker; do
            for f in "$src"/dotori "$src"/dotori.exe \
                     "$src"/dotori-server "$src"/dotori-server.exe \
                     "$src"/dotori-worker "$src"/dotori-worker.exe; do
              [ -f "$f" ] && cp "$f" dist/
            done
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-${{ matrix.rid }}
          path: dist/
          retention-days: 7
