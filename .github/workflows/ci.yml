name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Publish NativeAOT (dotori CLI)
        run: dotnet publish src/Dotori.Cli/Dotori.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained
        env:
          SDKROOT: ${{ matrix.os == 'macos-latest' && '/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk' || '' }}

      - name: Publish dotori-server
        run: dotnet publish src/Dotori.BuildServer/Dotori.BuildServer.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:DebugType=none -p:DebugSymbols=false

      - name: Publish dotori-worker
        run: dotnet publish src/Dotori.Worker/Dotori.Worker.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:DebugType=none -p:DebugSymbols=false

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          CLI_DIR=src/Dotori.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish
          SVR_DIR=src/Dotori.BuildServer/bin/Release/net10.0/${{ matrix.rid }}/publish
          WRK_DIR=src/Dotori.Worker/bin/Release/net10.0/${{ matrix.rid }}/publish
          for name in dotori dotori.exe; do if [ -f "$CLI_DIR/$name" ]; then cp "$CLI_DIR/$name" dist/; fi; done
          for name in dotori-server dotori-server.exe; do if [ -f "$SVR_DIR/$name" ]; then cp "$SVR_DIR/$name" dist/; fi; done
          for name in dotori-worker dotori-worker.exe; do if [ -f "$WRK_DIR/$name" ]; then cp "$WRK_DIR/$name" dist/; fi; done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-${{ matrix.rid }}
          path: dist/
          retention-days: 7
