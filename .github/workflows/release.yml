name: Release

on:
  push:
    branches:
      - 'release/v*'

jobs:
  # ── 1. 빌드 + 테스트 ────────────────────────────────────────────────────────
  build-and-test:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}
    name: Build & Test (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ── 2. 플랫폼별 퍼블리시 + zip ─────────────────────────────────────────────
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}
    name: Publish (${{ matrix.rid }})
    needs: build-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Publish NativeAOT (dotori CLI)
        run: dotnet publish src/Dotori.Cli/Dotori.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:Version=${{ steps.version.outputs.tag }}
        env:
          SDKROOT: ${{ matrix.os == 'macos-latest' && '/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk' || '' }}

      - name: Publish dotori-server
        run: dotnet publish src/Dotori.BuildServer/Dotori.BuildServer.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.version.outputs.tag }}

      - name: Publish dotori-worker
        run: dotnet publish src/Dotori.Worker/Dotori.Worker.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.version.outputs.tag }}

      - name: Collect & zip (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          CLI_DIR=src/Dotori.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish
          SVR_DIR=src/Dotori.BuildServer/bin/Release/net10.0/${{ matrix.rid }}/publish
          WRK_DIR=src/Dotori.Worker/bin/Release/net10.0/${{ matrix.rid }}/publish
          for name in dotori dotori.exe; do if [ -f "$CLI_DIR/$name" ]; then cp "$CLI_DIR/$name" dist/; fi; done
          for name in dotori-server dotori-server.exe; do if [ -f "$SVR_DIR/$name" ]; then cp "$SVR_DIR/$name" dist/; fi; done
          for name in dotori-worker dotori-worker.exe; do if [ -f "$WRK_DIR/$name" ]; then cp "$WRK_DIR/$name" dist/; fi; done
          cd dist
          zip ../dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip *

      - name: Collect & zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $CLI_DIR = "src/Dotori.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish"
          $SVR_DIR = "src/Dotori.BuildServer/bin/Release/net10.0/${{ matrix.rid }}/publish"
          $WRK_DIR = "src/Dotori.Worker/bin/Release/net10.0/${{ matrix.rid }}/publish"
          foreach ($name in @("dotori.exe", "dotori")) {
            if (Test-Path "$CLI_DIR/$name") { Copy-Item "$CLI_DIR/$name" dist/ }
          }
          foreach ($name in @("dotori-server.exe", "dotori-server")) {
            if (Test-Path "$SVR_DIR/$name") { Copy-Item "$SVR_DIR/$name" dist/ }
          }
          foreach ($name in @("dotori-worker.exe", "dotori-worker")) {
            if (Test-Path "$WRK_DIR/$name") { Copy-Item "$WRK_DIR/$name" dist/ }
          }
          Compress-Archive -Path dist/* -DestinationPath "dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}
          path: dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip
          retention-days: 1

  # ── 3. GitHub Release 생성 + 에셋 업로드 ───────────────────────────────────
  release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 전체 히스토리 (changelog 생성용)

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          # 이전 릴리즈 태그 탐색 (없으면 첫 커밋부터)
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            HEADER="## What's Changed\n\nFirst release 🎉"
          else
            RANGE="${PREV_TAG}..HEAD"
            HEADER="## What's Changed\n\n**Full Changelog**: \`${PREV_TAG}\` → \`${CURRENT_TAG}\`"
          fi

          # 커밋 로그를 카테고리별로 분류
          FEATURES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- (feat|add)[:!]" || true)
          FIXES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- fix[:!]" || true)
          CI_CHANGES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- ci[:!]" || true)
          OTHERS=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -ivE "^- (feat|add|fix|ci)[:!]" || true)

          BODY="$HEADER"
          [ -n "$FEATURES" ] && BODY="$BODY\n\n### ✨ New Features\n$FEATURES"
          [ -n "$FIXES" ]    && BODY="$BODY\n\n### 🐛 Bug Fixes\n$FIXES"
          [ -n "$CI_CHANGES" ] && BODY="$BODY\n\n### ⚙️ CI / Build\n$CI_CHANGES"
          [ -n "$OTHERS" ]   && BODY="$BODY\n\n### 🔧 Other Changes\n$OTHERS"

          # multiline output
          {
            echo "body<<EOF"
            printf "$BODY"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotori-${{ steps.version.outputs.tag }}-*
          merge-multiple: true
          path: release-assets/

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag  = '${{ steps.version.outputs.tag }}';
            const body = `${{ steps.changelog.outputs.body }}`;

            // 릴리즈 생성
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: `dotori ${tag}`,
              body: body,
              draft: false,
              prerelease: tag.includes('-'),
            });

            // zip 에셋 업로드
            const assetsDir = 'release-assets';
            for (const file of fs.readdirSync(assetsDir)) {
              const filePath = path.join(assetsDir, file);
              const data     = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                release_id: release.data.id,
                name:     file,
                data:     data,
              });
              console.log(`Uploaded: ${file}`);
            }
