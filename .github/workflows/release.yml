name: Release

on:
  push:
    branches:
      - 'release/v*'

jobs:
  # ── 1. 빌드 + 테스트 ────────────────────────────────────────────────────────
  build-and-test:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

    runs-on: ${{ matrix.os }}
    name: Build & Test (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ── 2. 플랫폼별 NativeAOT 퍼블리시 + zip ────────────────────────────────────
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

    runs-on: ${{ matrix.os }}
    name: Publish (${{ matrix.rid }})
    needs: build-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install clang (Linux)
        if: startsWith(matrix.rid, 'linux')
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build NativeAOT artifacts
        shell: bash
        run: |
          ./build.sh \
            --only cli,build_server,worker \
            --rid ${{ matrix.rid }} \
            --version ${{ steps.version.outputs.tag }}
        env:
          SDKROOT: ${{ matrix.os == 'macos-latest' && '/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk' || '' }}

      - name: Collect & zip
        shell: bash
        run: |
          mkdir -p dist/cli dist/server dist/worker
          for f in build/cli/dotori build/cli/dotori.exe; do
            if [ -f "$f" ]; then cp "$f" dist/cli/; fi
          done
          for f in build/build_server/dotori-server build/build_server/dotori-server.exe; do
            if [ -f "$f" ]; then cp "$f" dist/server/; fi
          done
          for f in build/worker/dotori-worker build/worker/dotori-worker.exe; do
            if [ -f "$f" ]; then cp "$f" dist/worker/; fi
          done
          (cd dist/cli    && zip ../../dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip *)
          (cd dist/server && zip ../../dotori-server-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip *)
          (cd dist/worker && zip ../../dotori-worker-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip *)

      - name: Upload dotori zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}
          path: dotori-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip
          retention-days: 1

      - name: Upload dotori-server zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-server-${{ steps.version.outputs.tag }}-${{ matrix.rid }}
          path: dotori-server-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip
          retention-days: 1

      - name: Upload dotori-worker zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotori-worker-${{ steps.version.outputs.tag }}-${{ matrix.rid }}
          path: dotori-worker-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip
          retention-days: 1

  # ── 3. GitHub Release 생성 + 에셋 업로드 ───────────────────────────────────
  release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 전체 히스토리 (changelog 생성용)

      - name: Extract version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          # 이전 릴리즈 태그 탐색 (없으면 첫 커밋부터)
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            HEADER="## What's Changed\n\nFirst release 🎉"
          else
            RANGE="${PREV_TAG}..HEAD"
            HEADER="## What's Changed\n\n**Full Changelog**: \`${PREV_TAG}\` → \`${CURRENT_TAG}\`"
          fi

          # 커밋 로그를 카테고리별로 분류
          FEATURES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- (feat|add)[:!]" || true)
          FIXES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- fix[:!]" || true)
          CI_CHANGES=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -iE "^- ci[:!]" || true)
          OTHERS=$(git log $RANGE --pretty="format:- %s (%h)" --no-merges | grep -ivE "^- (feat|add|fix|ci)[:!]" || true)

          BODY="$HEADER"
          [ -n "$FEATURES" ] && BODY="$BODY\n\n### ✨ New Features\n$FEATURES"
          [ -n "$FIXES" ]    && BODY="$BODY\n\n### 🐛 Bug Fixes\n$FIXES"
          [ -n "$CI_CHANGES" ] && BODY="$BODY\n\n### ⚙️ CI / Build\n$CI_CHANGES"
          [ -n "$OTHERS" ]   && BODY="$BODY\n\n### 🔧 Other Changes\n$OTHERS"

          # multiline output
          {
            echo "body<<EOF"
            printf "$BODY"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotori*-${{ steps.version.outputs.tag }}-*
          merge-multiple: true
          path: release-assets/

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag  = '${{ steps.version.outputs.tag }}';
            const body = `${{ steps.changelog.outputs.body }}`;

            // 릴리즈 생성
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: `dotori ${tag}`,
              body: body,
              draft: false,
              prerelease: tag.includes('-'),
            });

            // zip 에셋 업로드
            const assetsDir = 'release-assets';
            for (const file of fs.readdirSync(assetsDir)) {
              const filePath = path.join(assetsDir, file);
              const data     = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                release_id: release.data.id,
                name:     file,
                data:     data,
              });
              console.log(`Uploaded: ${file}`);
            }
