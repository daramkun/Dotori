version: "3.9"

services:
  worker1:
    build:
      context: .
      dockerfile: src/Dotori.Worker/Dockerfile
    ports:
      - "5101:5100"

  worker2:
    build:
      context: .
      dockerfile: src/Dotori.Worker/Dockerfile
    ports:
      - "5102:5100"

  server:
    build:
      context: .
      dockerfile: src/Dotori.BuildServer/Dockerfile
    ports:
      - "5100:5100"
    environment:
      - DOTORI_WORKERS=http://worker1:5100,http://worker2:5100
    depends_on:
      - worker1
      - worker2

  # Package registry (standalone mode, filesystem storage)
  registry:
    build:
      context: .
      dockerfile: src/Dotori.Registry/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - Registry__Mode=standalone
      - Registry__StorageRoot=/data/packages
      - ConnectionStrings__Default=Data Source=/data/registry.db
      - OAuth__Jwt__Secret=${DOTORI_JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      - OAuth__Providers__github__Enabled=${GITHUB_OAUTH_ENABLED:-false}
      - OAuth__Providers__github__ClientId=${GITHUB_CLIENT_ID:-}
      - OAuth__Providers__github__ClientSecret=${GITHUB_CLIENT_SECRET:-}
    volumes:
      - registry-data:/data
    restart: unless-stopped

  # Optional: MinIO S3-compatible storage backend
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    profiles:
      - s3

  # Registry with MinIO S3 backend (use: docker compose --profile s3 up)
  registry-s3:
    build:
      context: .
      dockerfile: src/Dotori.Registry/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - Registry__Mode=standalone
      - ConnectionStrings__Default=Data Source=/data/registry.db
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_REGION=us-east-1
      - S3_BUCKET=dotori-packages
      - S3_ENDPOINT=http://minio:9000
      - OAuth__Jwt__Secret=${DOTORI_JWT_SECRET:-change-this-secret-in-production-min-32-chars}
    volumes:
      - registry-s3-data:/data
    depends_on:
      - minio
    restart: unless-stopped
    profiles:
      - s3

volumes:
  registry-data:
  minio-data:
  registry-s3-data:
